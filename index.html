<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="星核工坊是一款浏览器端数值增长放置游戏。"
    />
    <title>星核工坊</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="status-band" aria-labelledby="game-title">
        <div>
          <p class="eyebrow">Codex Game Operator</p>
          <h1 id="game-title">星核工坊</h1>
        </div>
        <dl class="score-grid" aria-label="当前产能">
          <div>
            <dt>能量</dt>
            <dd id="energyValue">0</dd>
          </div>
          <div>
            <dt>每秒</dt>
            <dd id="perSecondValue">0</dd>
          </div>
          <div>
            <dt>每次</dt>
            <dd id="perClickValue">1</dd>
          </div>
          <div>
            <dt>过载</dt>
            <dd id="overloadValue">+5</dd>
          </div>
        </dl>
      </section>

      <section class="play-layout" aria-label="星核工坊控制台">
        <div class="core-zone">
          <div class="goal-strip">
            <span id="goalLabel">目标</span>
            <strong id="goalValue">购买第一次升级</strong>
            <span id="goalHint" class="goal-hint">进度 0 次升级 / 1 次升级 · 还差 10 能量购买聚能透镜</span>
            <div class="goal-meter" aria-hidden="true">
              <span id="goalMeter"></span>
            </div>
          </div>
          <p id="offlineNotice" class="offline-notice" aria-live="polite" hidden></p>
          <p id="actionNotice" class="action-notice" aria-live="polite" hidden></p>

          <button id="coreButton" class="core-button" type="button">
            <svg
              class="core-art"
              viewBox="0 0 220 220"
              role="img"
              aria-label="发光的星核"
            >
              <defs>
                <radialGradient id="coreGlow" cx="50%" cy="50%" r="52%">
                  <stop offset="0%" stop-color="#fff7c2" />
                  <stop offset="42%" stop-color="#f4b23c" />
                  <stop offset="72%" stop-color="#e85d75" />
                  <stop offset="100%" stop-color="#1a1815" />
                </radialGradient>
              </defs>
              <circle cx="110" cy="110" r="92" fill="#1a1815" />
              <circle cx="110" cy="110" r="72" fill="url(#coreGlow)" />
              <path
                d="M110 36 L123 93 L179 78 L136 117 L176 159 L121 142 L110 198 L99 142 L44 159 L84 117 L41 78 L97 93 Z"
                fill="#fff7c2"
                opacity="0.72"
              />
              <circle cx="110" cy="110" r="28" fill="#f8f3e7" />
            </svg>
            <span>点火</span>
          </button>

          <div class="combo-line">
            <span id="comboValue">连击 0</span>
            <span id="pulseValue">稳定</span>
          </div>
        </div>

        <aside class="upgrade-panel" aria-labelledby="upgrade-title">
          <div class="panel-header">
            <h2 id="upgrade-title">升级</h2>
            <button id="resetButton" class="ghost-button" type="button">重置</button>
          </div>
          <div id="upgradeList" class="upgrade-list"></div>

          <section class="project-section" aria-labelledby="project-title">
            <h2 id="project-title">星图计划</h2>
            <div class="project-overview" aria-live="polite">
              <strong id="projectOverview">星图进度 0/10 · 下一段 1/10：点亮星图</strong>
              <span id="projectOverviewDetail">进度 0 能量 / 100K 能量 · 还差 100K 能量</span>
              <span id="projectOverviewBonus">生效加成：等待首个星图奖励</span>
              <em id="projectOverviewForecast">航线预告：点亮星图（总产能 +12%）、谐振校准（过载奖励 +20%）、透镜阵列（点击产能 +18%）</em>
            </div>
            <div
              id="routeStanceList"
              class="route-stance-list"
              aria-label="航线策略"
            ></div>
            <div id="projectList" class="project-list"></div>
          </section>

          <form id="feedbackForm" class="feedback-form" aria-labelledby="feedback-title">
            <h2 id="feedback-title">反馈</h2>
            <label for="feedbackType">
              类型
              <select id="feedbackType" name="feedbackType">
                <option value="experience">体验反馈</option>
                <option value="bug">问题/Bug</option>
                <option value="balance">平衡建议</option>
                <option value="idea">新想法</option>
              </select>
            </label>
            <label for="feedbackRating">
              评分
              <select id="feedbackRating" name="feedbackRating">
                <option value="5">5</option>
                <option value="4">4</option>
                <option value="3" selected>3</option>
                <option value="2">2</option>
                <option value="1">1</option>
              </select>
            </label>
            <label for="feedbackMessage">
              内容
              <textarea
                id="feedbackMessage"
                name="feedbackMessage"
                rows="4"
                maxlength="1200"
                required
              ></textarea>
            </label>
            <button class="feedback-submit" type="submit">提交反馈</button>
            <p id="feedbackStatus" class="feedback-status" aria-live="polite"></p>
          </form>
        </aside>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
