<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 132" role="img" aria-labelledby="title desc">
  <title id="title">升级工坊视觉插画</title>
  <desc id="desc">聚能透镜、自动采集臂、星核稳定器和星核谐振器组成的升级工坊插画。</desc>
  <defs>
