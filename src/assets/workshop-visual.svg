<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">星核工坊主操作插画</title>
  <desc id="desc">星核、聚能透镜、自动采集臂、稳定器和谐振环组成的工坊画面。</desc>
  <defs>
    <radialGradient id="coreGlow" cx="48%" cy="44%" r="54%">
      <stop offset="0" stop-color="#fff7c2"/>
      <stop offset="0.4" stop-color="#f4b23c"/>
      <stop offset="0.72" stop-color="#e85d75"/>
      <stop offset="1" stop-color="#3a171d"/>
    </radialGradient>
    <linearGradient id="benchShade" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#251d1a"/>
      <stop offset="1" stop-color="#0f1616"/>
    </linearGradient>
    <linearGradient id="energyBeam" x1="170" x2="802" y1="162" y2="162" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#13b5a6"/>
      <stop offset="0.5" stop-color="#fff7c2"/>
      <stop offset="1" stop-color="#e85d75"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.95 0 1 0 0 0.56 0 0 1 0 0.26 0 0 0 0.64 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

