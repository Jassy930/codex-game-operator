<svg id="farDispatchVisual" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 220" role="img" aria-labelledby="farDispatchVisualTitle farDispatchVisualDesc">
  <title id="farDispatchVisualTitle">远航调度闭环插画</title>
