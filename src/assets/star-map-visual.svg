    <circle cx="128" cy="304" r="2" fill="#bdf4eb"/>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M126 238 C224 168 294 164 372 202 S528 264 604 216 S746 120 838 158" stroke="url(#routeLine)" stroke-width="7" opacity="0.95"/>
    <path d="M136 258 C242 212 306 215 390 244 S544 292 622 246 S748 166 826 188" stroke="#f8f3e7" stroke-width="2" opacity="0.22"/>
