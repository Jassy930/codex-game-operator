<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">星核工坊星图航线插画</title>
  <desc id="desc">发光星核、航线节点、远航星门和深空航迹组成的星图画面。</desc>
  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fff7c2"/>
      <stop offset="0.36" stop-color="#f4b23c"/>
      <stop offset="0.7" stop-color="#e85d75"/>
      <stop offset="1" stop-color="#3d181e"/>
    </radialGradient>
    <radialGradient id="gateGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0" stop-color="#bdf4eb"/>
      <stop offset="0.58" stop-color="#13b5a6"/>
      <stop offset="1" stop-color="#0b3d3c"/>
    </radialGradient>
    <linearGradient id="routeLine" x1="126" x2="838" y1="238" y2="158" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f4b23c"/>
      <stop offset="0.48" stop-color="#13b5a6"/>
      <stop offset="1" stop-color="#e85d75"/>
    </linearGradient>
    <linearGradient id="panelShade" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#211b18"/>
      <stop offset="1" stop-color="#0f1616"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.96 0 1 0 0 0.56 0 0 1 0 0.22 0 0 0 0.65 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="960" height="420" rx="28" fill="url(#panelShade)"/>
  <path d="M0 78 C170 36 318 48 468 98 C626 151 768 127 960 58 L960 0 L0 0 Z" fill="#22312e" opacity="0.5"/>
  <path d="M0 344 C164 298 292 330 432 363 C594 401 762 379 960 313 L960 420 L0 420 Z" fill="#261d22" opacity="0.72"/>

  <g opacity="0.85">
