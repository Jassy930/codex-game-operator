      <path d="M56 9l3.3 6.7 7.4 1.1-5.4 5.2 1.3 7.4-6.6-3.5-6.6 3.5 1.3-7.4-5.4-5.2 7.4-1.1z" opacity=".48"/>
      <path d="M83 9l3.3 6.7 7.4 1.1-5.4 5.2 1.3 7.4-6.6-3.5-6.6 3.5 1.3-7.4-5.4-5.2 7.4-1.1z" opacity=".32"/>
    </g>
  </g>

  <g transform="translate(279 30)">
    <rect x="0" y="0" width="74" height="58" rx="14" fill="#211a12" stroke="#f4b23c" stroke-opacity=".38" stroke-width="3"/>
    <path d="M18 19h39M18 34h27" stroke="#f4b23c" stroke-width="6" stroke-linecap="round" stroke-opacity=".7"/>
    <path d="M58 7l10 10-10 10" fill="none" stroke="#13b5a6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M58 17H42" stroke="#13b5a6" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g filter="url(#feedbackGlow)" stroke="url(#feedbackAccent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
