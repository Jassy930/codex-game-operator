<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 120" role="img" aria-labelledby="title desc">
  <title id="title">反馈草稿视觉插画</title>
  <desc id="desc">反馈草稿、评分轨和 Issue 投递路径组成的抽象界面插画。</desc>
  <defs>
    <linearGradient id="feedbackBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#121615"/>
      <stop offset=".56" stop-color="#17201f"/>
      <stop offset="1" stop-color="#221a12"/>
    </linearGradient>
    <linearGradient id="feedbackAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#13b5a6"/>
      <stop offset=".62" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#f4b23c"/>
    </linearGradient>
    <filter id="feedbackGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="384" height="120" rx="18" fill="url(#feedbackBg)"/>
  <path d="M16 86C58 46 96 90 137 54s78-26 112 4 62 20 118-28" fill="none" stroke="#2fd5c5" stroke-opacity=".22" stroke-width="2"/>
  <path d="M26 92C76 63 106 72 149 89s72 9 105-18 57-28 100-1" fill="none" stroke="#f4b23c" stroke-opacity=".16" stroke-width="2"/>

  <g transform="translate(30 24)">
    <rect x="0" y="0" width="94" height="72" rx="12" fill="#1e2623" stroke="#f8f3e7" stroke-opacity=".18"/>
    <path d="M16 18h48M16 33h62M16 48h40" stroke="#f8f3e7" stroke-opacity=".56" stroke-width="6" stroke-linecap="round"/>
    <path d="M68 0v22h26" fill="#111615" stroke="#13b5a6" stroke-opacity=".58" stroke-width="3" stroke-linejoin="round"/>
    <rect x="16" y="58" width="52" height="6" rx="3" fill="#13b5a6" opacity=".72"/>
  </g>

  <g transform="translate(148 21)">
    <path d="M16 15h83a16 16 0 0 1 16 16v24a16 16 0 0 1-16 16H47L28 86l4-15H16A16 16 0 0 1 0 55V31a16 16 0 0 1 16-16Z" fill="#101918" stroke="#67e8f9" stroke-opacity=".42" stroke-width="3"/>
    <path d="M25 39h67M25 53h43" stroke="#67e8f9" stroke-width="6" stroke-linecap="round" stroke-opacity=".72"/>
    <g fill="#f4b23c">
