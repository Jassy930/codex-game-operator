<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 260" role="img" aria-labelledby="title desc">
  <title id="title">星核工坊航线指令插画</title>
  <desc id="desc">点火齐射、巡航回收、谐振脉冲和三步轮换轨组成的航线指令画面。</desc>
  <defs>
    <linearGradient id="panelShade" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#171b1a"/>
      <stop offset="0.55" stop-color="#211817"/>
      <stop offset="1" stop-color="#101617"/>
    </linearGradient>
    <linearGradient id="routeBeam" x1="170" x2="790" y1="130" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f4b23c"/>
      <stop offset="0.5" stop-color="#13b5a6"/>
      <stop offset="1" stop-color="#e85d75"/>
    </linearGradient>
    <filter id="panelGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.18 0 1 0 0 0.78 0 0 1 0 0.72 0 0 0 0.34 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="960" height="260" rx="26" fill="url(#panelShade)"/>
  <path d="M0 72 C146 34 266 50 404 88 C552 130 716 104 960 42 L960 0 L0 0 Z" fill="#22312d" opacity="0.55"/>
  <path d="M0 210 C142 178 284 188 448 222 C620 258 762 236 960 184 L960 260 L0 260 Z" fill="#281c23" opacity="0.68"/>

  <g opacity="0.76">
    <path d="M86 54h48" stroke="#f4b23c" stroke-width="6" stroke-linecap="round"/>
    <path d="M118 80h84" stroke="#13b5a6" stroke-width="4" stroke-linecap="round"/>
    <path d="M752 58h122" stroke="#e85d75" stroke-width="5" stroke-linecap="round"/>
    <path d="M706 82h72" stroke="#bdf4eb" stroke-width="4" stroke-linecap="round"/>
    <path d="M76 204h130" stroke="#bdf4eb" stroke-width="5" stroke-linecap="round"/>
    <path d="M778 206h98" stroke="#f4b23c" stroke-width="5" stroke-linecap="round"/>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M180 130 C286 84 388 88 480 130 S674 176 780 130" stroke="url(#routeBeam)" stroke-width="9" opacity="0.94"/>
    <path d="M180 154 C292 126 386 130 480 154 S670 182 780 154" stroke="#f8f3e7" stroke-width="2" opacity="0.24"/>
    <path d="M246 90 L714 90" stroke="#f8f3e7" stroke-width="2" stroke-dasharray="10 14" opacity="0.2"/>
  </g>

  <g filter="url(#panelGlow)">
    <g>
      <rect x="110" y="76" width="164" height="132" rx="18" fill="#161714" stroke="#f4b23c" stroke-width="4"/>
      <path d="M192 96l18 34h-14l12 48-34-60h18z" fill="none" stroke="#ffd98a" stroke-width="8" stroke-linejoin="round"/>
      <path d="M146 174c28 22 66 22 94 0" fill="none" stroke="#fff7c2" stroke-width="5"/>
      <path d="M146 122h34M214 122h24" stroke="#f4b23c" stroke-width="5"/>
    </g>

    <g>
      <rect x="398" y="76" width="164" height="132" rx="18" fill="#121918" stroke="#13b5a6" stroke-width="4"/>
      <path d="M430 114c28-26 66-30 104-16l14-18 8 46-46 4 16-16c-32-10-58-4-78 16" fill="none" stroke="#bdf4eb" stroke-width="8"/>
      <path d="M530 146c-28 26-66 30-104 16l-14 18-8-46 46-4-16 16c32 10 58 4 78-16" fill="none" stroke="#bdf4eb" stroke-width="8"/>
    </g>

    <g>
      <rect x="686" y="76" width="164" height="132" rx="18" fill="#211518" stroke="#e85d75" stroke-width="4"/>
      <path d="M768 102v22M768 160v22M710 142h22M804 142h22" stroke="#ffc1cf" stroke-width="7"/>
      <circle cx="768" cy="142" r="42" fill="none" stroke="#ffc1cf" stroke-width="7"/>
      <circle cx="768" cy="142" r="17" fill="#f4b23c" opacity="0.78"/>
    </g>
  </g>

  <g>
    <rect x="306" y="32" width="348" height="28" rx="14" fill="#111615" stroke="#f8f3e7" stroke-width="2" opacity="0.72"/>
    <rect x="322" y="42" width="86" height="8" rx="4" fill="#f4b23c"/>
    <rect x="438" y="42" width="86" height="8" rx="4" fill="#13b5a6"/>
    <rect x="554" y="42" width="86" height="8" rx="4" fill="#e85d75"/>
  </g>

  <g opacity="0.86">
    <path d="M320 220h320" stroke="#f8f3e7" stroke-width="2" opacity="0.2"/>
    <rect x="320" y="210" width="72" height="20" rx="10" fill="#f4b23c"/>
    <rect x="444" y="210" width="72" height="20" rx="10" fill="#13b5a6"/>
    <rect x="568" y="210" width="72" height="20" rx="10" fill="#e85d75"/>
  </g>
</svg>
